version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        API_PROXY_TARGET: http://backend:4000
    env_file:
      - frontend/.env.local
    depends_on:
      - backend
    ports:
      - "3000:3000"
